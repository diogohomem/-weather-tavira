<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Meteorologia – Tavira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-serif  : 'Cormorant Garamond', Georgia, serif;
      --font-body   : -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --c-text      : #2C2C2C;
      --c-muted     : #7A8A94;
      --c-icon      : #5B7080;
      --c-divider   : rgba(0,0,0,0.06);
      --c-sea       : #2a7fa5;
      --c-sand      : #FAF5EC;
      --radius      : 16px;
    }

    html, body {
      background: transparent;
      font-family: var(--font-body);
    }

    /* ── Card shell ── */
    .ww-card {
      width         : 320px;
      min-height    : 400px;
      border-radius : var(--radius);
      background    : #fff;
      border        : 1px solid rgba(0,0,0,0.08);
      box-shadow    : 0 2px 12px rgba(0,0,0,0.08);
      overflow      : hidden;
      display       : flex;
      flex-direction: column;
      margin        : 0 auto;
    }
    @media (max-width: 359px) {
      .ww-card { width: 100%; max-width: 360px; }
    }

    /* ── Accent gradient stripe (8px, changes with condition) ── */
    .ww-accent {
      height    : 6px;
      width     : 100%;
      background: linear-gradient(90deg, #93C5FD, #BAE6FD);  /* default: sky */
      flex-shrink: 0;
    }
    .ww-accent--sun   { background: linear-gradient(90deg, #FDE68A, #FCD34D); }
    .ww-accent--cloud { background: linear-gradient(90deg, #CBD5E1, #E2E8F0); }
    .ww-accent--rain  { background: linear-gradient(90deg, #93C5FD, #60A5FA); }
    .ww-accent--storm { background: linear-gradient(90deg, #818CF8, #6366F1); }
    .ww-accent--snow  { background: linear-gradient(90deg, #BAE6FD, #E0F2FE); }

    /* ── Inner padding wrapper ── */
    .ww-inner {
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    /* ── Header ── */
    .ww-header {
      display    : flex;
      align-items: center;
      gap        : 8px;
    }
    .ww-header svg { flex-shrink: 0; }
    .ww-header__title {
      font-family   : var(--font-serif);
      font-size     : 1.15rem;
      font-weight   : 400;
      color         : var(--c-text);
      letter-spacing: 0.01em;
      line-height   : 1.2;
    }

    /* ── Temps row ── */
    .ww-temps {
      display        : flex;
      align-items    : center;
      justify-content: space-around;
      gap            : 0;
      background     : var(--c-sand);
      border-radius  : 12px;
      padding        : 12px 8px;
    }
    .ww-temp-col {
      flex          : 1;
      display       : flex;
      flex-direction: column;
      align-items   : center;
      gap           : 4px;
    }
    .ww-temp-col svg { color: var(--c-icon); }
    .ww-temp__value {
      font-family : var(--font-serif);
      font-size   : 2.75rem;
      font-weight : 600;
      line-height : 1;
      color       : var(--c-text);
      display     : inline-flex;
      align-items : baseline;
      gap         : 1px;
    }
    .ww-temp__value--sea { color: var(--c-sea); }
    .ww-temp__unit {
      font-size  : 0.85rem;
      font-weight: 300;
      line-height: 1;
      align-self : flex-end;
      margin-bottom: 3px;
    }
    .ww-temp__label {
      font-size     : 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color         : var(--c-muted);
      text-align    : center;
    }
    .ww-sep {
      width      : 1px;
      height     : 60%;
      background : rgba(0,0,0,0.06);
      align-self : center;
      flex-shrink: 0;
    }

    /* ── Section label ── */
    .ww-section-label {
      font-family   : var(--font-serif);
      font-size     : 0.9rem;
      font-style    : italic;
      color         : var(--c-muted);
      letter-spacing: 0.02em;
    }

    /* ── Forecast rows ── */
    .ww-forecast {
      display       : flex;
      flex-direction: column;
    }
    .ww-forecast-row {
      display        : flex;
      align-items    : center;
      height         : 40px;
      gap            : 0;
      border-bottom  : 1px solid rgba(0,0,0,0.06);
    }
    .ww-forecast-row:last-child { border-bottom: none; }
    .ww-forecast-row:hover { background: rgba(0,0,0,0.025); border-radius: 6px; }

    .ww-fc-day {
      font-size  : 0.8rem;
      font-weight: 500;
      color      : var(--c-text);
      width      : 36px;
      flex-shrink: 0;
    }
    .ww-fc-icon {
      flex          : 1;
      display       : flex;
      justify-content: center;
    }
    .ww-fc-temps {
      font-family: var(--font-serif);
      font-size  : 0.875rem;
      display    : flex;
      gap        : 6px;
      width      : 68px;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    .ww-fc-max { font-weight: 600; color: var(--c-text); }
    .ww-fc-min { font-weight: 300; color: var(--c-muted); }

    /* ── Footer ── */
    .ww-footer {
      font-size : 0.68rem;
      color     : rgba(0,0,0,0.30);
      text-align: center;
      margin-top: auto;
      padding-top: 4px;
    }

    /* ── Loading / Error ── */
    .ww-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      padding: 32px 20px;
      color: var(--c-muted);
      font-size: .88rem;
    }
  </style>
</head>
<body>

<div class="ww-card" id="ww-card">
  <div class="ww-accent" id="ww-accent"></div>
  <div class="ww-inner" id="ww-inner">
    <div class="ww-state">A carregar dados…</div>
  </div>
</div>

<script>
'use strict';

/* ── Lucide SVG icons (inline, 24x24 viewBox, stroke=currentColor) ── */
const ICONS = {
  thermometer: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>`,

  waves: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>`,

  sun: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>`,

  cloudSun: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2M4.93 4.93l1.41 1.41M20 12h2M19.07 4.93l-1.41 1.41M15.947 12.65a4 4 0 0 0-5.925-4.128"/><path d="M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6z"/></svg>`,

  cloud: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>`,

  cloudRain: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M16 14v6M8 14v6M12 16v6"/></svg>`,

  cloudDrizzle: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M8 19v1M8 14v1M16 19v1M16 14v1M12 21v1M12 16v1"/></svg>`,

  cloudSnow: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M8 15h.01M8 19h.01M12 17h.01M12 21h.01M16 15h.01M16 19h.01"/></svg>`,

  cloudLightning: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 16.326A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 .5 8.973"/><path d="m13 12-3 5h4l-3 5"/></svg>`,

  wind: (size, color) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>`,
};

/* ── Map weather codes → icon key + accent class ── */
function codeToIcon(code) {
  if (code == null) return { key: 'cloud', accent: 'cloud', color: '#5B7080' };

  // OpenWeather codes
  if (code >= 200 && code < 300) return { key: 'cloudLightning', accent: 'storm', color: '#818CF8' };
  if (code >= 300 && code < 400) return { key: 'cloudDrizzle',   accent: 'rain',  color: '#60A5FA' };
  if (code >= 500 && code < 600) return { key: 'cloudRain',      accent: 'rain',  color: '#3B82F6' };
  if (code >= 600 && code < 700) return { key: 'cloudSnow',      accent: 'snow',  color: '#93C5FD' };
  if (code >= 700 && code < 800)  return { key: 'wind',           accent: 'cloud', color: '#94A3B8' };  // fog/mist/haze
  if (code === 800)               return { key: 'sun',            accent: 'sun',   color: '#F59E0B' };
  if (code === 801)               return { key: 'cloudSun',       accent: 'sun',   color: '#FBBF24' };
  if (code === 802)               return { key: 'cloudSun',       accent: 'cloud', color: '#94A3B8' };
  if (code >= 803)                return { key: 'cloud',          accent: 'cloud', color: '#94A3B8' };

  // WMO codes (Open-Meteo daily forecast)
  if (code === 0)               return { key: 'sun',           accent: 'sun',   color: '#F59E0B' };
  if (code === 1)               return { key: 'cloudSun',      accent: 'sun',   color: '#FBBF24' };
  if (code === 2)               return { key: 'cloudSun',      accent: 'cloud', color: '#94A3B8' };
  if (code === 3)               return { key: 'cloud',         accent: 'cloud', color: '#94A3B8' };
  if (code <= 48)               return { key: 'wind',          accent: 'cloud', color: '#94A3B8' };
  if (code <= 57)               return { key: 'cloudDrizzle',  accent: 'rain',  color: '#60A5FA' };
  if (code <= 67)               return { key: 'cloudRain',     accent: 'rain',  color: '#3B82F6' };
  if (code <= 77)               return { key: 'cloudSnow',     accent: 'snow',  color: '#93C5FD' };
  if (code <= 82)               return { key: 'cloudRain',     accent: 'rain',  color: '#60A5FA' };
  if (code <= 86)               return { key: 'cloudSnow',     accent: 'snow',  color: '#93C5FD' };
  if (code <= 99)               return { key: 'cloudLightning',accent: 'storm', color: '#818CF8' };

  return { key: 'cloud', accent: 'cloud', color: '#5B7080' };
}

const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function fmtDay(dateStr, i) {
  if (i === 0) return 'Hoje';
  // Append 'Z' to force UTC parsing — prevents day offset on non-Portugal systems
  const d = new Date(dateStr + 'T12:00:00Z');
  return DAYS_PT[d.getUTCDay()];
}

async function loadWidget() {
  const card   = document.getElementById('ww-card');
  const accent = document.getElementById('ww-accent');
  const inner  = document.getElementById('ww-inner');

  try {
    const res  = await fetch('/api/widget-data');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d    = await res.json();

    const { airTemp, seaTemp, weatherCode, forecast } = d;
    const ci = codeToIcon(weatherCode);

    /* accent stripe */
    accent.className = 'ww-accent ww-accent--' + ci.accent;

    /* forecast rows */
    const rows = (forecast?.time || []).map((dateStr, i) => {
      const fc   = codeToIcon(forecast.weathercode[i]);
      const maxT = Math.round(forecast.temperature_2m_max[i]);
      const minT = Math.round(forecast.temperature_2m_min[i]);
      return `<div class="ww-forecast-row">
        <span class="ww-fc-day">${fmtDay(dateStr, i)}</span>
        <span class="ww-fc-icon">${ICONS[fc.key](28, fc.color)}</span>
        <span class="ww-fc-temps">
          <span class="ww-fc-max">${maxT}°</span>
          <span class="ww-fc-min">${minT}°</span>
        </span>
      </div>`;
    }).join('');

    const seaVal = seaTemp != null
      ? `${seaTemp}<span class="ww-temp__unit">°C</span>`
      : `<span style="font-size:1.5rem">—</span>`;

    inner.innerHTML = `
      <div class="ww-header">
        ${ICONS[ci.key](24, ci.color)}
        <span class="ww-header__title">Tavira — Condições</span>
      </div>

      <div class="ww-temps">
        <div class="ww-temp-col">
          ${ICONS.thermometer(40, '#5B7080')}
          <span class="ww-temp__value">${airTemp}<span class="ww-temp__unit">°C</span></span>
          <span class="ww-temp__label">Temperatura Ar</span>
        </div>
        <div class="ww-sep"></div>
        <div class="ww-temp-col">
          ${ICONS.waves(40, '#2a7fa5')}
          <span class="ww-temp__value ww-temp__value--sea">${seaVal}</span>
          <span class="ww-temp__label">Temperatura Água</span>
        </div>
      </div>

      <p class="ww-section-label">Previsão para 7 dias</p>

      <div class="ww-forecast">${rows}</div>

      <p class="ww-footer">Dados: OpenWeather · Open-Meteo · Atualizado a cada 15&nbsp;min</p>
    `;
  } catch (err) {
    inner.innerHTML = `<div class="ww-state">
      ${ICONS.cloudLightning(32,'#CBD5E1')}
      <span>Não foi possível carregar os dados.</span>
      <small style="font-size:.75rem;color:rgba(0,0,0,.3)">${err.message}</small>
    </div>`;
  }
}

loadWidget();
setInterval(loadWidget, 15 * 60 * 1000);
</script>

</body>
</html>
